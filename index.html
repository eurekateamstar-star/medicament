<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥物小卡</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background-color: #f4f4f4;}
        #message { margin-top: 20px; font-size: 18px; color: #333; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid #00B900; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader" id="loader"></div>
    <div id="message">正在為您開啟藥物小卡...</div>

    <!-- 1. 載入 LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <!-- 2. 載入 Firebase SDK (使用瀏覽器專用的 CDN 連結) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // 你的 Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyD9oJirgoJCTU7h-ODfSpfwC80E5fqze2A",
            authDomain: "clawone-6445c.firebaseapp.com",
            projectId: "clawone-6445c",
            storageBucket: "clawone-6445c.firebasestorage.app",
            messagingSenderId: "945236029933",
            appId: "1:945236029933:web:f93ffb9e6f8b41aebd37e4",
            measurementId: "G-JEB18KRCXS"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);

        // 初始化 LIFF 
        async function main() {
            try {
                // 使用你截圖中的 LIFF ID
                await liff.init({ liffId: "2010309703-y5s1PA3N" });
                
                document.getElementById('message').innerText = "取得檔案中...";

                // 👇👇👇 注意！請把 "your_file_name.pdf" 換成你實際在 Storage 裡面的 PDF 檔名 👇👇👇
                const pdfPath = 'inv/your_file_name.pdf'; 
                const pdfRef = ref(storage, pdfPath);

                // 取得 Firebase Storage 檔案的下載網址
                const url = await getDownloadURL(pdfRef);
                
                document.getElementById('message').innerText = "開啟中...";
                
                // 將網頁轉向到 PDF 網址，LINE 會自動預覽
                window.location.replace(url);

            } catch (error) {
                console.error("發生錯誤:", error);
                document.getElementById('loader').style.display = 'none';
                document.getElementById('message').innerText = "讀取失敗：" + error.message;
            }
        }

        // 執行
        main();
    </script>
</body>
</html>
